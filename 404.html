
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — LUNA</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .error-page{ position:relative; overflow:hidden; }
  .error-moon svg{ width:100%; height:100%; }
  .error-star{ position:absolute; border-radius:50%; background:#fff; opacity:.8; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{ opacity:.2; } 50%{ opacity:1; } }
  @keyframes driftMoon{ 0%,100%{ transform: translateY(0) rotate(0deg);} 50%{ transform: translateY(-18px) rotate(3deg);} }
  .error-moon{ animation: driftMoon 5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="aurora"></div>
<div class="noise"></div>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand"><img src="assets/images/app-icon.png" alt="LUNA logo">LUNA</a>
    <nav class="nav-links"><a href="index.html">Back home</a></nav>
  </div>
</header>

<main class="error-page">
  <div id="stars"></div>
  <div class="container">
    <div class="error-moon" data-reveal="scale">
      <svg viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8B5CF6"/>
            <stop offset="100%" stop-color="#FF6FB5"/>
          </linearGradient>
        </defs>
        <path d="M130 20a80 80 0 1 0 50 130 65 65 0 0 1-50-130Z" fill="url(#moonGrad)"/>
      </svg>
    </div>
    <div class="error-code text-gradient" data-reveal>404</div>
    <h1 style="margin-bottom:14px;" data-reveal>This page waned into the dark</h1>
    <p class="lede" style="margin:0 auto 32px;" data-reveal>The page you're looking for isn't here anymore — or never existed. Let's get you back to a familiar phase.</p>
    <div class="hero-ctas" style="justify-content:center;" data-reveal>
      <a href="index.html" class="btn btn-primary">Return home</a>
      <a href="support.html" class="btn btn-ghost">Contact support</a>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
<script>
  const starsWrap = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'error-star';
    const size = Math.random() * 2.5 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    starsWrap.appendChild(s);
  }
</script>
</body>
</html>
